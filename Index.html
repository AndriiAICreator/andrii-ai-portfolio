<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автомобільний Конвертер Ваги</title>
    <!-- Додано фавіконку (іконку автомобіля для вкладки браузера) -->
    <link rel="icon" href="https://fav.farm/🚗" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .transition-all {
            transition-property: all;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 300ms;
        }
        /* Стиль для фонового візерунка типу "карбон" або дорога */
        .bg-pattern {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-100 bg-pattern flex items-center justify-center p-4 font-sans text-slate-800">

    <div class="bg-white/95 backdrop-blur-xl w-full max-w-md rounded-3xl shadow-2xl border border-slate-200 p-8 relative overflow-hidden">
        
        <!-- Декоративна смуга зверху (схожа на розмітку або спорт-смугу) -->
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-600 to-indigo-600"></div>

        <!-- Заголовок -->
        <div class="text-center mb-8 mt-2">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-50 text-blue-600 mb-4 shadow-sm border border-blue-100 transform rotate-3">
                <!-- Іконка Автомобіля -->
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 -rotate-3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 0 1-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 0 0-3.213-9.193 2.056 2.056 0 0 0-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 0 0-10.026 0 1.106 1.106 0 0 0-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Розрахунок маси</h1>
            <p class="text-sm text-slate-500 mt-1">Калькулятор повної та спорядженої маси</p>
        </div>

        <!-- Вкладки (Tabs) -->
        <div class="flex space-x-1 bg-slate-100 p-1 rounded-xl mb-6 relative z-10">
            <button id="tab1Btn" class="flex-1 py-2.5 px-4 rounded-lg font-bold text-sm transition-all bg-white text-blue-600 shadow-sm border border-slate-200/50">
                З Фунтів (США)
            </button>
            <button id="tab2Btn" class="flex-1 py-2.5 px-4 rounded-lg font-bold text-sm transition-all text-slate-500 hover:text-slate-700 hover:bg-slate-200/50 border border-transparent">
                Тільки Кілограми
            </button>
        </div>

        <!-- ================= ВМІСТ ВКЛАДКИ 1 ================= -->
        <div id="tab1Content">
            <!-- Поля вводу -->
            <div class="space-y-6 relative z-10">
                
                <!-- Поле 1: Фунти по табличці -->
                <div>
                    <label for="lbsInput" class="block text-sm font-semibold text-slate-700 mb-1 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-slate-400">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                        </svg>
                        Вага у фунтах по табличці
                    </label>
                    <div class="relative">
                        <input type="number" id="lbsInput" placeholder="Наприклад: 5500" 
                            class="block w-full pl-4 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm text-lg font-bold text-slate-800">
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 font-semibold">
                            lbs
                        </div>
                    </div>
                </div>

                <!-- Поле 2: Кілограми з кольорової таблички -->
                <div>
                    <label for="kgInput" class="block text-sm font-semibold text-slate-700 mb-1 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-orange-400">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 0 0 3 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 0 0 5.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 0 0 9.568 3Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6Z" />
                        </svg>
                        Вага з кольорової таблички
                    </label>
                    <div class="relative">
                        <input type="number" id="kgInput" placeholder="Наприклад: 450" 
                            class="block w-full pl-4 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all shadow-sm text-lg font-bold text-slate-800">
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 font-semibold">
                            кг
                        </div>
                    </div>
                </div>

            </div>

            <!-- Лінія роздільник -->
            <div class="my-8 border-t border-slate-200 border-dashed"></div>

            <!-- Результати -->
            <div class="space-y-4 relative z-10">
                
                <!-- Результат 1: Повна маса -->
                <div class="bg-blue-50/80 rounded-2xl p-5 border border-blue-100 relative overflow-hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor" class="absolute -right-4 -bottom-4 w-24 h-24 text-blue-500/10">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" />
                    </svg>
                    
                    <div class="relative z-10">
                        <span class="text-xs font-bold text-blue-800 uppercase tracking-wider block mb-1">Повна маса авто:</span>
                        <div class="flex items-end gap-1">
                            <span id="convertedResult" class="text-4xl font-black text-blue-700">0</span>
                            <span class="text-xl font-bold text-blue-600 mb-1">кг</span>
                        </div>
                        <div id="exactResult" class="text-xs text-blue-500 mt-1 font-medium bg-white/60 inline-block px-2 py-0.5 rounded-md border border-blue-100">
                            Точне значення: 0.00 кг
                        </div>
                    </div>
                </div>

                <!-- Результат 2: Споряджена маса -->
                <div class="bg-indigo-50/80 rounded-2xl p-5 border border-indigo-100">
                    <span class="text-xs font-bold text-indigo-800 uppercase tracking-wider block mb-1">Споряджена маса (різниця):</span>
                    <div class="flex items-end gap-1">
                        <span id="differenceValue" class="text-3xl font-black text-indigo-700">0</span>
                        <span class="text-lg font-bold text-indigo-600 mb-1">кг</span>
                    </div>
                    <p id="differenceText" class="text-xs text-indigo-500 mt-2 font-medium">Введіть обидва значення для розрахунку</p>
                </div>

            </div>
        </div>

        <!-- ================= ВМІСТ ВКЛАДКИ 2 ================= -->
        <div id="tab2Content" class="hidden">
            <div class="space-y-6 relative z-10">
                <!-- Поле 1: Повна маса (кг) -->
                <div>
                    <label for="kgMainInput" class="block text-sm font-semibold text-slate-700 mb-1 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-blue-500">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                        </svg>
                        Повна маса з основної таблички
                    </label>
                    <div class="relative">
                        <input type="number" id="kgMainInput" placeholder="Наприклад: 2500" 
                            class="block w-full pl-4 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm text-lg font-bold text-slate-800">
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 font-semibold">
                            кг
                        </div>
                    </div>
                </div>

                <!-- Поле 2: Кольорова табличка (кг) -->
                <div>
                    <label for="kgColorTab2" class="block text-sm font-semibold text-slate-700 mb-1 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-orange-400">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 0 0 3 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 0 0 5.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 0 0 9.568 3Z" />
                        </svg>
                        Вага з кольорової таблички
                    </label>
                    <div class="relative">
                        <input type="number" id="kgColorTab2" placeholder="Наприклад: 450" 
                            class="block w-full pl-4 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all shadow-sm text-lg font-bold text-slate-800">
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 font-semibold">
                            кг
                        </div>
                    </div>
                </div>
            </div>

            <!-- Лінія роздільник -->
            <div class="my-8 border-t border-slate-200 border-dashed"></div>

            <!-- Результат Вкладки 2 -->
            <div class="bg-indigo-50/80 rounded-2xl p-5 border border-indigo-100">
                <span class="text-xs font-bold text-indigo-800 uppercase tracking-wider block mb-1">Споряджена маса (різниця):</span>
                <div class="flex items-end gap-1">
                    <span id="tab2DifferenceValue" class="text-4xl font-black text-indigo-700">0</span>
                    <span class="text-xl font-bold text-indigo-600 mb-1">кг</span>
                </div>
                <p id="tab2DifferenceText" class="text-xs text-indigo-500 mt-2 font-medium">Введіть обидва значення для розрахунку</p>
            </div>
        </div>

    </div>

    <script>
        // Елементи вкладок
        const tab1Btn = document.getElementById('tab1Btn');
        const tab2Btn = document.getElementById('tab2Btn');
        const tab1Content = document.getElementById('tab1Content');
        const tab2Content = document.getElementById('tab2Content');

        // Елементи Вкладки 1
        const lbsInput = document.getElementById('lbsInput');
        const kgInput = document.getElementById('kgInput');
        const convertedResult = document.getElementById('convertedResult');
        const exactResult = document.getElementById('exactResult');
        const differenceValue = document.getElementById('differenceValue');
        const differenceText = document.getElementById('differenceText');

        // Елементи Вкладки 2
        const kgMainInput = document.getElementById('kgMainInput');
        const kgColorTab2 = document.getElementById('kgColorTab2');
        const tab2DifferenceValue = document.getElementById('tab2DifferenceValue');
        const tab2DifferenceText = document.getElementById('tab2DifferenceText');

        const LBS_TO_KG = 0.45359237;

        // --- Логіка перемикання вкладок ---
        function switchTab(tabIndex) {
            if (tabIndex === 1) {
                tab1Content.classList.remove('hidden');
                tab2Content.classList.add('hidden');
                
                tab1Btn.className = "flex-1 py-2.5 px-4 rounded-lg font-bold text-sm transition-all bg-white text-blue-600 shadow-sm border border-slate-200/50";
                tab2Btn.className = "flex-1 py-2.5 px-4 rounded-lg font-bold text-sm transition-all text-slate-500 hover:text-slate-700 hover:bg-slate-200/50 border border-transparent";
            } else {
                tab2Content.classList.remove('hidden');
                tab1Content.classList.add('hidden');
                
                tab2Btn.className = "flex-1 py-2.5 px-4 rounded-lg font-bold text-sm transition-all bg-white text-blue-600 shadow-sm border border-slate-200/50";
                tab1Btn.className = "flex-1 py-2.5 px-4 rounded-lg font-bold text-sm transition-all text-slate-500 hover:text-slate-700 hover:bg-slate-200/50 border border-transparent";
            }
        }

        tab1Btn.addEventListener('click', () => switchTab(1));
        tab2Btn.addEventListener('click', () => switchTab(2));

        // --- Логіка Вкладки 1 (З фунтів у кг + різниця) ---
        function calculate() {
            const lbs = parseFloat(lbsInput.value);
            const kg = parseFloat(kgInput.value);

            let exactKg = 0;
            let roundedKg = 0;

            // 1. Повна маса авто
            if (!isNaN(lbs)) {
                exactKg = lbs * LBS_TO_KG;
                roundedKg = Math.round(exactKg); // Заокруглення за правилами математики
                
                convertedResult.textContent = roundedKg;
                exactResult.textContent = `Точне значення: ${exactKg.toFixed(2)} кг`;
            } else {
                convertedResult.textContent = '0';
                exactResult.textContent = 'Точне значення: 0.00 кг';
            }

            // 2. Споряджена маса
            if (!isNaN(lbs) && !isNaN(kg)) {
                const difference = Math.abs(roundedKg - kg);
                differenceValue.textContent = difference;
                differenceText.textContent = `Різниця між повною масою (${roundedKg} кг) та кольоровою табличкою (${kg} кг)`;
            } else {
                differenceValue.textContent = '0';
                if (isNaN(lbs) && isNaN(kg)) {
                    differenceText.textContent = 'Введіть обидва значення для розрахунку';
                } else if (isNaN(kg)) {
                    differenceText.textContent = 'Чекаю значення з кольорової таблички...';
                } else {
                    differenceText.textContent = 'Чекаю значення у фунтах...';
                }
            }
        }

        // --- Логіка Вкладки 2 (Тільки кілограми) ---
        function calculateTab2() {
            const kgMain = parseFloat(kgMainInput.value);
            const kgColor = parseFloat(kgColorTab2.value);

            if (!isNaN(kgMain) && !isNaN(kgColor)) {
                const difference = Math.abs(kgMain - kgColor);
                tab2DifferenceValue.textContent = difference;
                tab2DifferenceText.textContent = `Різниця між основною (${kgMain} кг) та кольоровою (${kgColor} кг)`;
            } else {
                tab2DifferenceValue.textContent = '0';
                if (isNaN(kgMain) && isNaN(kgColor)) {
                    tab2DifferenceText.textContent = 'Введіть обидва значення для розрахунку';
                } else if (isNaN(kgColor)) {
                    tab2DifferenceText.textContent = 'Чекаю значення з кольорової таблички...';
                } else {
                    tab2DifferenceText.textContent = 'Чекаю значення основної маси...';
                }
            }
        }

        // Слухачі подій для автоматичного розрахунку при вводі
        lbsInput.addEventListener('input', calculate);
        kgInput.addEventListener('input', calculate);
        kgMainInput.addEventListener('input', calculateTab2);
        kgColorTab2.addEventListener('input', calculateTab2);
    </script>
</body>
</html>
